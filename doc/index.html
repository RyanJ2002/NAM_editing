<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAM-LSS · Feature Shape Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg:      #0b0d12;
  --surf:    #12151e;
  --surf2:   #181c28;
  --surf3:   #1f2336;
  --border:  #252b3b;
  --border2: #2e3650;
  --text:    #dde4f0;
  --muted:   #5a6580;
  --accent:  #58a6ff;
  --accent2: #79c0ff;
  --pos:     #3fb950;
  --neg:     #f85149;
  --warn:    #d29922;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* ── TOP BAR ── */
.topbar{
  height:48px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:var(--surf);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.brand{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.06em}
.brand span{color:var(--muted);font-weight:400}
.topbar-right{display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;
  padding:5px 13px;border-radius:4px;border:1px solid var(--border2);
  background:var(--surf2);color:var(--text);cursor:pointer;transition:all .15s;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);color:#000}
.btn-sm{padding:3px 10px;font-size:10px}
.btn-ghost{background:none;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{color:var(--text);border-color:var(--border)}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 48px)}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--surf);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-header{
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.sidebar-header select{
  flex:1;background:var(--surf2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:11px;
  padding:4px 8px;border-radius:4px;outline:none;
}
.feat-scroll{overflow-y:auto;flex:1}
.feat-group-label{
  padding:10px 16px 4px;font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
}
.feat-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;cursor:pointer;border-left:2px solid transparent;
  transition:all .1s;font-size:12.5px;gap:6px;
}
.feat-btn:hover{background:var(--surf2)}
.feat-btn.active{border-left-color:var(--accent);background:var(--surf2);color:var(--accent)}
.feat-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.feat-dot.modified{background:var(--accent)}

/* ── MAIN ── */
.main{overflow-y:auto;padding:20px 24px}

/* ── FEATURE HEADER ── */
.feat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.feat-title{font-size:18px;font-weight:600;margin-bottom:4px}
.feat-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
.feat-actions{display:flex;gap:6px;flex-shrink:0}

/* ── CHART CARD ── */
.chart-card{
  background:var(--surf);border:1px solid var(--border);border-radius:8px;
  padding:20px;margin-bottom:16px;position:relative;
}
.chart-wrap{position:relative;height:260px}
.chart-legend{
  display:flex;gap:16px;margin-bottom:12px;
  font-family:var(--mono);font-size:10px;color:var(--muted);
}
.legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}

/* ── DELTA TABLE ── */
.delta-card{
  background:var(--surf);border:1px solid var(--border);border-radius:8px;
  padding:20px;margin-bottom:16px;
}
.delta-card-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
.section-title{font-size:13px;font-weight:500;color:var(--text)}
.section-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}

.bin-table{width:100%;border-collapse:collapse}
.bin-table th{
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);padding:0 8px 8px;text-align:left;
}
.bin-row-tr{border-top:1px solid var(--border)}
.bin-row-tr td{padding:5px 8px;vertical-align:middle}
.x-range{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.y-val{font-family:var(--mono);font-size:11px;font-weight:500}
.y-pos{color:var(--pos)}
.y-neg{color:var(--neg)}
.y-zero{color:var(--muted)}
.delta-input-wrap{display:flex;align-items:center;gap:8px}
input[type=range]{
  -webkit-appearance:none;width:120px;height:3px;
  background:var(--border2);border-radius:2px;outline:none;cursor:pointer;flex-shrink:0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--accent);cursor:pointer;
}
.delta-display{
  font-family:var(--mono);font-size:11px;font-weight:600;
  min-width:52px;text-align:right;
}
.reset-btn-sm{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:12px;padding:2px 4px;transition:color .1s;
}
.reset-btn-sm:hover{color:var(--neg)}

/* ── EXPORT PANEL ── */
.export-card{
  background:var(--surf);border:1px solid var(--border);border-radius:8px;
  padding:20px;margin-bottom:16px;
}
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.export-btn-big{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:16px;background:var(--surf2);border:1px solid var(--border2);
  border-radius:6px;cursor:pointer;transition:all .15s;text-align:center;
}
.export-btn-big:hover{border-color:var(--accent);color:var(--accent)}
.export-btn-big .icon{font-size:22px}
.export-btn-big .label{font-family:var(--mono);font-size:11px;font-weight:600}
.export-btn-big .desc{font-size:11px;color:var(--muted)}

/* ── LOAD OVERLAY ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:500;
}
.overlay-box{
  background:var(--surf);border:1px solid var(--border2);border-radius:10px;
  padding:32px 40px;text-align:center;width:400px;
}
.overlay-title{font-size:16px;font-weight:600;margin-bottom:8px}
.overlay-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.file-drop{
  border:2px dashed var(--border2);border-radius:8px;padding:32px;
  cursor:pointer;transition:border-color .2s;margin-bottom:16px;
}
.file-drop:hover{border-color:var(--accent)}
.file-drop input{display:none}
.file-drop-text{color:var(--muted);font-size:13px}
.file-drop-text strong{color:var(--accent)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--surf2);
  border:1px solid var(--border2);border-radius:6px;padding:10px 18px;
  font-family:var(--mono);font-size:12px;color:var(--accent);
  transform:translateY(60px);opacity:0;transition:all .22s;pointer-events:none;z-index:999;
}
.toast.show{transform:translateY(0);opacity:1}

/* ── EMPTY / PLACEHOLDER ── */
.placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:12px;color:var(--muted);
}
.placeholder-icon{font-size:40px;opacity:.4}
.placeholder-text{font-size:14px}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;
}
.stat-pill{
  background:var(--surf);border:1px solid var(--border);border-radius:6px;
  padding:10px 14px;
}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:600}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="brand">NAM-LSS <span>/ shape editor</span></div>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="showLoadOverlay()">📂 Load JSON</button>
    <button class="btn btn-sm" onclick="resetAllDeltas()">Reset All</button>
    <button class="btn btn-sm" onclick="showExportPanel()">Export ▾</button>
    <button class="btn btn-accent btn-sm" onclick="downloadJSON()">⬇ Download JSON</button>
  </div>
</header>

<!-- LOAD OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-title">Load Shape Data</div>
    <div class="overlay-sub">上傳由 <code>export_shape_data.py</code> 產生的 JSON 檔</div>
    <label class="file-drop" id="file-drop">
      <input type="file" accept=".json" id="file-input" onchange="handleFile(this)">
      <div class="file-drop-text">
        <div style="font-size:28px;margin-bottom:8px">📄</div>
        <div>拖曳或點擊選擇 <strong>shape_data.json</strong></div>
        <div style="margin-top:6px;font-size:11px">檔案只在本機處理，不會上傳任何伺服器</div>
      </div>
    </label>
    <button class="btn btn-ghost btn-sm" onclick="loadDemo()">或載入 Demo 資料</button>
  </div>
</div>

<!-- SHELL -->
<div class="shell" id="shell" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <select id="fold-select" onchange="onFoldChange()">
        <option value="1">Fold 1 (→ CY)</option>
        <option value="2">Fold 2 (→ D6)</option>
        <option value="3">Fold 3 (→ TN)</option>
      </select>
    </div>
    <div class="feat-scroll" id="feat-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-panel">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">←</div>
      <div class="placeholder-text">左側選擇一個特徵</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const S = {
  data: null,          // parsed shape_data.json
  fold: '1',
  activeFeature: null,
  chart: null,
  // user deltas: { foldKey: { fname: [ delta per-bin ] } }
  userDeltas: {}
};

const BINS = 20;  // how many editable bins we show per feature

// ══════════════════════════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════════════════════════
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      S.data = JSON.parse(e.target.result);
      initDeltas();
      openApp();
      toast('✓ Loaded: ' + file.name);
    } catch(err) {
      alert('JSON parse error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function showLoadOverlay() {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('shell').style.display = 'none';
}

function openApp() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('shell').style.display = 'grid';
  renderSidebar();
  // auto-select first feature
  const fnames = S.data.feature_names;
  if (fnames && fnames.length) selectFeature(fnames[0]);
}

// ══════════════════════════════════════════════════════════════
// DEMO DATA GENERATOR
// ══════════════════════════════════════════════════════════════
function loadDemo() {
  const features = [
    'Pre_HD_SBP','Age','IDH_N_7D','IDH_N_28D','Heart_Rate',
    'Weight_Excess','UF_Rate_Per_Hour','SBP_Risk_Zone',
    'Recent_IDH_Burden','BMI_Proxy','Body_Temperature',
    'Pre_HD_Weight','Dry_Weight','Target_UF_Volume',
    'Blood_Flow_Rate','Weight_Excess_Pct','Dialysate_Temperature',
    'Sex','Respiratory_Rate','Estimated_UF_Volume',
    'Dialysate_Flow_Rate','Start_DBP','UF_BW_Perc'
  ];
  const N = 100;
  const folds = {};
  ['1','2','3'].forEach(fi => {
    const shapes = {};
    features.forEach((f,idx) => {
      const x_t = Array.from({length:N},(_, i)=> -3 + i*6/(N-1));
      // Generate plausible shape functions
      const phase = idx * 0.7;
      const amp = 0.05 + Math.random()*0.12;
      const y_mean = x_t.map(x => amp * Math.tanh(x + phase*0.3) + (Math.random()-0.5)*0.005);
      const y_std  = x_t.map(() => 0.005 + Math.random()*0.01);
      // Raw values (simulated)
      const lo = [50,30,0,0,40,-2,0,0,0,10,35,40,35,0,150,-.5,35][idx%17] ?? -3;
      const hi = [200,90,10,30,120,5,3,1,2,50,38.5,100,90,5,400,.5,39][idx%17] ?? 3;
      const x_orig = x_t.map(v => lo + (v+3)/6*(hi-lo));
      shapes[f] = {
        feature_name:f, feature_idx:idx,
        x_transformed:x_t, x_original:x_orig,
        y_mean, y_std,
        is_binary: f==='Sex',
        deltas: new Array(N).fill(0)
      };
    });
    folds[fi] = shapes;
  });
  S.data = { version:'demo', feature_names:features, folds };
  initDeltas();
  openApp();
  toast('Demo data loaded');
}

// ══════════════════════════════════════════════════════════════
// DELTAS
// ══════════════════════════════════════════════════════════════
function initDeltas() {
  ['1','2','3'].forEach(fi => {
    S.userDeltas[fi] = {};
    const fnames = S.data.feature_names;
    fnames.forEach(f => {
      S.userDeltas[fi][f] = new Array(BINS).fill(0);
    });
  });
}

function getDelta(fname, binIdx) {
  return (S.userDeltas[S.fold]?.[fname]?.[binIdx]) ?? 0;
}
function setDelta(fname, binIdx, val) {
  if (!S.userDeltas[S.fold]) S.userDeltas[S.fold] = {};
  if (!S.userDeltas[S.fold][fname]) S.userDeltas[S.fold][fname] = new Array(BINS).fill(0);
  S.userDeltas[S.fold][fname][binIdx] = val;
}
function isModified(fname) {
  return (S.userDeltas[S.fold]?.[fname] ?? []).some(d => d !== 0);
}

// ══════════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════════
function renderSidebar() {
  const fnames = S.data?.feature_names ?? [];
  const base = ['Sex','Age','IDH_N_7D','IDH_N_28D','Pre_HD_SBP','Start_DBP',
                 'Heart_Rate','Respiratory_Rate','Body_Temperature','Pre_HD_Weight',
                 'Dry_Weight','Target_UF_Volume','UF_BW_Perc','Blood_Flow_Rate',
                 'Dialysate_Flow_Rate','Dialysate_Temperature','Estimated_UF_Volume'];
  const eng  = fnames.filter(f => !base.includes(f));
  const bas2 = fnames.filter(f => base.includes(f));

  let html = '';
  if (bas2.length) {
    html += `<div class="feat-group-label">Base Features</div>`;
    bas2.forEach(f => html += featBtn(f));
  }
  if (eng.length) {
    html += `<div class="feat-group-label">Engineered</div>`;
    eng.forEach(f => html += featBtn(f));
  }
  document.getElementById('feat-list').innerHTML = html;
}

function featBtn(fname) {
  const active = S.activeFeature === fname ? ' active' : '';
  const mod    = isModified(fname) ? ' modified' : '';
  return `<div class="feat-btn${active}" id="fb-${CSS.escape(fname)}" onclick="selectFeature('${fname}')">
    <span class="feat-name">${fname}</span>
    <span class="feat-dot${mod}"></span>
  </div>`;
}

function onFoldChange() {
  S.fold = document.getElementById('fold-select').value;
  renderSidebar();
  if (S.activeFeature) selectFeature(S.activeFeature);
}

// ══════════════════════════════════════════════════════════════
// FEATURE PANEL
// ══════════════════════════════════════════════════════════════
function selectFeature(fname) {
  S.activeFeature = fname;

  // sidebar highlight
  document.querySelectorAll('.feat-btn').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('fb-' + CSS.escape(fname));
  if (nav) nav.classList.add('active');

  const fdata = S.data?.folds?.[S.fold]?.[fname];
  if (!fdata) { renderPlaceholder('No data for this fold'); return; }

  document.getElementById('placeholder').style.display = 'none';

  const panel = document.getElementById('main-panel');
  panel.innerHTML = buildPanel(fname, fdata);

  renderChart(fname, fdata);
}

function buildPanel(fname, fdata) {
  const npts = fdata.x_original.length;
  // Bin the data for the delta table
  const binSize = Math.floor(npts / BINS);

  // Compute adjusted y
  const yAdj = computeAdjusted(fdata, fname);

  // Stats
  const yArr = fdata.y_mean;
  const peakContrib = Math.max(...yArr.map(Math.abs)).toFixed(4);
  const range = (Math.max(...fdata.x_original) - Math.min(...fdata.x_original)).toFixed(1);
  const modCount = (S.userDeltas[S.fold]?.[fname] ?? []).filter(d=>d!==0).length;

  // Build bin rows
  let binRows = '';
  for (let b = 0; b < BINS; b++) {
    const i0 = b * binSize;
    const i1 = Math.min(i0 + binSize - 1, npts - 1);
    const xLo = fdata.x_original[i0]?.toFixed(2) ?? '—';
    const xHi = fdata.x_original[i1]?.toFixed(2) ?? '—';
    const yMean = fdata.y_mean.slice(i0, i1+1).reduce((a,b)=>a+b,0) / (i1-i0+1);
    const delta = getDelta(fname, b);
    const yFinal = yMean + delta;
    const yClass = yFinal > 0.002 ? 'y-pos' : yFinal < -0.002 ? 'y-neg' : 'y-zero';
    const dClass = delta > 0 ? 'y-pos' : delta < 0 ? 'y-neg' : 'y-zero';
    const dStr   = delta === 0 ? '±0.000' : (delta>0?'+':'')+delta.toFixed(3);

    binRows += `
    <tr class="bin-row-tr" id="brow-${b}">
      <td><span class="x-range">[${xLo}, ${xHi}]</span></td>
      <td><span class="y-val ${yClass}">${yFinal > 0 ? '+' : ''}${yFinal.toFixed(4)}</span></td>
      <td>
        <div class="delta-input-wrap">
          <input type="range" min="-0.15" max="0.15" step="0.005" value="${delta}"
            oninput="onDelta('${fname}',${b},this.value)">
          <span class="delta-display ${dClass}" id="dd-${b}">${dStr}</span>
          <button class="reset-btn-sm" onclick="resetBin('${fname}',${b})" title="Reset">✕</button>
        </div>
      </td>
    </tr>`;
  }

  return `
  <div class="feat-header">
    <div>
      <div class="feat-title">${fname}</div>
      <div class="feat-meta">Fold ${S.fold} · ${fdata.x_original.length} scan points · peak |contrib| = ${peakContrib}</div>
    </div>
    <div class="feat-actions">
      <button class="btn btn-sm" onclick="resetFeature('${fname}')">Reset</button>
      <button class="btn btn-sm btn-accent" onclick="exportFeaturePNG('${fname}')">⬇ PNG</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-pill"><div class="stat-label">Value Range</div><div class="stat-val">${range}</div></div>
    <div class="stat-pill"><div class="stat-label">Peak |Contrib|</div><div class="stat-val">${peakContrib}</div></div>
    <div class="stat-pill"><div class="stat-label">Bins Adjusted</div><div class="stat-val" id="sp-mod">${modCount}</div></div>
    <div class="stat-pill"><div class="stat-label">Scan Points</div><div class="stat-val">${npts}</div></div>
  </div>

  <div class="chart-card">
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:#58a6ff;height:2px"></span>Original shape</span>
      <span><span class="legend-dot" style="background:#3fb950;height:2px"></span>After adjustment</span>
      <span><span class="legend-dot" style="background:rgba(88,166,255,.2);height:8px;border-radius:2px"></span>±1σ (ensemble)</span>
    </div>
    <div class="chart-wrap"><canvas id="shape-chart"></canvas></div>
  </div>

  <div class="delta-card">
    <div class="delta-card-header">
      <div>
        <div class="section-title">Bin-level Delta Adjustment</div>
        <div class="section-sub">調整每個 bin 的 contribution offset，即時更新上方圖形</div>
      </div>
      <button class="btn btn-sm" onclick="resetFeature('${fname}')">Reset All Bins</button>
    </div>
    <table class="bin-table">
      <thead><tr>
        <th>x range (original)</th>
        <th>contribution (adjusted)</th>
        <th>delta slider</th>
      </tr></thead>
      <tbody>${binRows}</tbody>
    </table>
  </div>

  <div class="export-card">
    <div class="section-title">Export This Feature</div>
    <div class="export-grid">
      <div class="export-btn-big" onclick="exportFeaturePNG('${fname}')">
        <div class="icon">🖼</div>
        <div class="label">PNG</div>
        <div class="desc">shape function 圖片</div>
      </div>
      <div class="export-btn-big" onclick="exportFeatureCSV('${fname}')">
        <div class="icon">📊</div>
        <div class="label">CSV</div>
        <div class="desc">x / y_orig / y_adj / delta</div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// CHART
// ══════════════════════════════════════════════════════════════
function computeAdjusted(fdata, fname) {
  const npts = fdata.x_original.length;
  const binSize = Math.floor(npts / BINS);
  return fdata.y_mean.map((y, i) => {
    const b = Math.min(Math.floor(i / binSize), BINS - 1);
    return y + getDelta(fname, b);
  });
}

function renderChart(fname, fdata) {
  if (S.chart) { S.chart.destroy(); S.chart = null; }
  const ctx = document.getElementById('shape-chart');
  if (!ctx) return;

  const xLabels = fdata.x_original.map(v => v.toFixed(2));
  const yOrig   = fdata.y_mean;
  const yAdj    = computeAdjusted(fdata, fname);
  const yUpper  = fdata.y_mean.map((y,i) => y + (fdata.y_std[i] ?? 0));
  const yLower  = fdata.y_mean.map((y,i) => y - (fdata.y_std[i] ?? 0));

  S.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: xLabels,
      datasets: [
        {
          label: 'σ upper', data: yUpper, borderWidth:0,
          backgroundColor:'rgba(88,166,255,.12)', fill:'+1', pointRadius:0, tension:.4
        },
        {
          label: 'σ lower', data: yLower, borderWidth:0,
          backgroundColor:'rgba(88,166,255,.12)', fill:false, pointRadius:0, tension:.4
        },
        {
          label:'Original', data:yOrig,
          borderColor:'#58a6ff', borderWidth:2, pointRadius:0,
          tension:.4, fill:false
        },
        {
          label:'Adjusted', data:yAdj,
          borderColor:'#3fb950', borderWidth:2, pointRadius:0,
          tension:.4, fill:false,
          borderDash: yAdj.every((v,i)=>v===yOrig[i]) ? [4,4] : []
        }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration:200},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1f2336',
          titleColor:'#dde4f0',
          bodyColor:'#8b9cc0',
          borderColor:'#2e3650',
          borderWidth:1,
          titleFont:{family:'IBM Plex Mono',size:10},
          bodyFont:{family:'IBM Plex Mono',size:10},
          callbacks:{
            title: items => `x = ${items[0].label}`,
            label: item => {
              if (item.datasetIndex < 2) return null;
              const tag = item.datasetIndex === 2 ? 'orig' : 'adj ';
              return `${tag}: ${item.raw.toFixed(5)}`;
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{color:'#5a6580',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10},
          grid:{color:'#1f2336'},
          border:{color:'#252b3b'}
        },
        y:{
          ticks:{color:'#5a6580',font:{family:'IBM Plex Mono',size:9}},
          grid:{color:'#1f2336'},
          border:{color:'#252b3b'}
        }
      }
    }
  });
}

function refreshChart() {
  const fname = S.activeFeature;
  if (!fname || !S.chart) return;
  const fdata = S.data?.folds?.[S.fold]?.[fname];
  if (!fdata) return;
  const yAdj = computeAdjusted(fdata, fname);
  S.chart.data.datasets[3].data = yAdj;
  S.chart.data.datasets[3].borderDash =
    yAdj.every((v,i) => v === fdata.y_mean[i]) ? [4,4] : [];
  S.chart.update('none');
}

// ══════════════════════════════════════════════════════════════
// DELTA INTERACTIONS
// ══════════════════════════════════════════════════════════════
function onDelta(fname, binIdx, val) {
  const v = parseFloat(val);
  setDelta(fname, binIdx, v);

  // Update display
  const dd = document.getElementById(`dd-${binIdx}`);
  if (dd) {
    dd.textContent = v === 0 ? '±0.000' : (v>0?'+':'')+v.toFixed(3);
    dd.className = 'delta-display ' + (v>0?'y-pos':v<0?'y-neg':'y-zero');
  }

  // Update contribution cell
  const fdata = S.data?.folds?.[S.fold]?.[fname];
  if (fdata) {
    const npts = fdata.x_original.length;
    const binSize = Math.floor(npts / BINS);
    const i0 = binIdx * binSize;
    const i1 = Math.min(i0 + binSize - 1, npts - 1);
    const yMean = fdata.y_mean.slice(i0, i1+1).reduce((a,b)=>a+b,0) / (i1-i0+1);
    const yFinal = yMean + v;
    const yClass = yFinal > 0.002 ? 'y-pos' : yFinal < -0.002 ? 'y-neg' : 'y-zero';
    const row = document.getElementById(`brow-${binIdx}`);
    if (row) {
      const yCell = row.querySelector('.y-val');
      if (yCell) {
        yCell.textContent = (yFinal>0?'+':'')+yFinal.toFixed(4);
        yCell.className = 'y-val ' + yClass;
      }
    }
  }

  // Sidebar dot
  const fb = document.getElementById('fb-' + CSS.escape(fname));
  if (fb) {
    const dot = fb.querySelector('.feat-dot');
    if (dot) dot.className = 'feat-dot' + (isModified(fname) ? ' modified' : '');
  }

  // Stat
  const sp = document.getElementById('sp-mod');
  if (sp) sp.textContent = (S.userDeltas[S.fold]?.[fname] ?? []).filter(d=>d!==0).length;

  refreshChart();
}

function resetBin(fname, b) {
  setDelta(fname, b, 0);
  // re-render panel section
  selectFeature(fname);
}

function resetFeature(fname) {
  S.userDeltas[S.fold][fname] = new Array(BINS).fill(0);
  selectFeature(fname);
  toast(`Reset: ${fname}`);
}

function resetAllDeltas() {
  if (!confirm('Reset ALL adjustments for all features and folds?')) return;
  initDeltas();
  renderSidebar();
  if (S.activeFeature) selectFeature(S.activeFeature);
  toast('All deltas reset');
}

// ══════════════════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════════════════
function showExportPanel() {
  // scroll to bottom of main panel or show a quick menu
  const choice = confirm('Export ALL features as JSON?\n\nOK → JSON (for Python)\nCancel → skip');
  if (choice) downloadJSON();
}

function downloadJSON() {
  if (!S.data) { toast('No data loaded'); return; }
  // Embed all user deltas into the data
  const out = JSON.parse(JSON.stringify(S.data));
  ['1','2','3'].forEach(fi => {
    if (!out.folds[fi]) return;
    Object.keys(out.folds[fi]).forEach(fname => {
      if (S.userDeltas[fi]?.[fname]) {
        out.folds[fi][fname].user_deltas = S.userDeltas[fi][fname];
      }
    });
  });
  out.edited_at = new Date().toISOString();
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shape_data_edited.json';
  a.click();
  toast('✓ Downloaded shape_data_edited.json');
}

function exportFeaturePNG(fname) {
  const canvas = document.getElementById('shape-chart');
  if (!canvas) { toast('Chart not ready'); return; }
  // White background version
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const ctx2 = tmp.getContext('2d');
  ctx2.fillStyle = '#0b0d12';
  ctx2.fillRect(0,0,tmp.width,tmp.height);
  ctx2.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.href = tmp.toDataURL('image/png');
  a.download = `shape_${fname}_fold${S.fold}.png`;
  a.click();
  toast(`✓ Exported ${fname}.png`);
}

function exportFeatureCSV(fname) {
  const fdata = S.data?.folds?.[S.fold]?.[fname];
  if (!fdata) return;
  const npts = fdata.x_original.length;
  const binSize = Math.floor(npts / BINS);
  const yAdj = computeAdjusted(fdata, fname);
  let csv = 'x_original,x_transformed,y_original,y_adjusted,y_std,delta_bin\n';
  for (let i = 0; i < npts; i++) {
    const b = Math.min(Math.floor(i / binSize), BINS - 1);
    csv += `${fdata.x_original[i].toFixed(4)},${fdata.x_transformed[i].toFixed(4)},`
         + `${fdata.y_mean[i].toFixed(6)},${yAdj[i].toFixed(6)},`
         + `${fdata.y_std[i].toFixed(6)},${getDelta(fname, b).toFixed(4)}\n`;
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shape_${fname}_fold${S.fold}.csv`;
  a.click();
  toast(`✓ Exported ${fname}.csv`);
}

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function renderPlaceholder(msg) {
  document.getElementById('main-panel').innerHTML =
    `<div class="placeholder"><div class="placeholder-icon">⚠</div><div class="placeholder-text">${msg}</div></div>`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// Auto-load shape_data.json if available in same directory
async function autoLoadJSON() {
  try {
    const res = await fetch('./shape_data.json');
    if (!res.ok) throw new Error('not found');
    S.data = await res.json();
    initDeltas();
    openApp();
    toast('✓ Loaded shape_data.json');
  } catch(e) {
    console.log('shape_data.json not found, showing upload overlay');
  }
}
autoLoadJSON();

// Drag-and-drop on overlay
const drop = document.getElementById('file-drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='var(--accent)'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor=''; });
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.style.borderColor='';
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        S.data = JSON.parse(ev.target.result);
        initDeltas(); openApp();
        toast('✓ Loaded: ' + file.name);
      } catch(err) { alert('Parse error: ' + err); }
    };
    reader.readAsText(file);
  }
});
</script>
